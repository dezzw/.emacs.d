name: Update and Build Demacs

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ==========================================================================
  # Update Phase: sequential updates so root lock stays in sync with sub-flakes
  # ==========================================================================

  update-inputs:
    name: Update all inputs
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Update Emacs source inputs
        run: |
          cd nix/emacs-overlay
          nix flake lock --update-input emacs-src-git --update-input emacs-src-igc

      - name: Update custom package inputs
        run: |
          cd nix/packages
          nix flake update

      - name: Update root lock (nixpkgs + sync sub-flake changes)
        run: |
          nix flake update

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet flake.lock nix/emacs-overlay/flake.lock nix/packages/flake.lock; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload all lock files
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lock-files
          path: |
            flake.lock
            nix/emacs-overlay/flake.lock
            nix/packages/flake.lock
          retention-days: 1

  # ==========================================================================
  # Build Phase: build all variants after updates
  # ==========================================================================

  build-and-cache:
    name: Build demacs (${{ matrix.os }} - ${{ matrix.version }})
    needs: [update-inputs]
    if: |
      always() &&
      !cancelled() &&
      (needs.update-inputs.outputs.has_changes == 'true' ||
       github.event_name == 'push')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        version: [igc, igc-patched, git, git-patched]
        exclude:
          # Patched variants use macOS-only patches; skip on Linux
          - os: ubuntu-latest
            version: igc-patched
          - os: ubuntu-latest
            version: git-patched
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download updated lock files
        if: needs.update-inputs.outputs.has_changes == 'true'
        uses: actions/download-artifact@v4
        with:
          name: lock-files

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: demacs
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build demacs-${{ matrix.version }}
        id: build
        run: |
          nix build .#demacs-${{ matrix.version }} --print-build-logs --keep-going

      - name: Push build to Cachix
        if: success()
        run: |
          nix build .#demacs-${{ matrix.version }} --no-link --print-out-paths | \
          cachix push demacs

  # ==========================================================================
  # Commit Phase: push all updated lock files (only on successful build)
  # ==========================================================================

  push-changes:
    name: Push updates to repository
    needs: [update-inputs, build-and-cache]
    if: |
      always() &&
      !cancelled() &&
      needs.update-inputs.outputs.has_changes == 'true' &&
      needs.build-and-cache.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download updated lock files
        uses: actions/download-artifact@v4
        with:
          name: lock-files

      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Commit and push changes
        run: |
          # Stage all updated lock files
          git add -A flake.lock nix/emacs-overlay/flake.lock nix/packages/flake.lock

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "[Chore] Update flake inputs"
          git pull --rebase --autostash
          git push
